name: Compile & Package Multi-Platform Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    # --- Setup Node.js & NPM dependencies ---
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: './meridian_frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: |
        cd meridian_frontend
        npm install

    # --- Setup Rust Compiler ---
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    # --- Setup Python Environment & Package Backend ---
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Create Backend Virtualenv & Install Requirements
      run: |
        cd meridian_backend
        python -m venv venv
        ./venv/Scripts/pip.exe install --upgrade pip
        ./venv/Scripts/pip.exe install -r requirements.txt
        ./venv/Scripts/pip.exe install pyinstaller
      shell: bash

    - name: Compile Standalone Backend Sidecar
      run: |
        python build_standalone.py --sidecar-only
      shell: bash

    # --- Build Tauri App and Publish to Draft GitHub Release ---
    - name: Build & Publish Tauri Desktop Installer
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tagName: ${{ github.ref_name }}
        tagMessage: "Meridian-X Desktop Windows Release ${{ github.ref_name }}"
        releaseName: "Meridian-X Windows Release ${{ github.ref_name }}"
        releaseBody: "Automated Windows compilation bundle for version ${{ github.ref_name }}. Includes precompiled binaries for Windows (.msi, .exe)."
        releaseDraft: true
        prerelease: false
        projectPath: './meridian_frontend'
