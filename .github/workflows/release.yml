name: Compile & Package Multi-Platform Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    # --- Setup Node.js & NPM dependencies ---
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: './meridian_frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: |
        cd meridian_frontend
        npm install

    # --- Setup Rust Compiler ---
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    # --- Setup Python Environment & Package Backend ---
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Create Backend Virtualenv & Install Requirements
      run: |
        cd meridian_backend
        python -m venv venv
        # Check platform to invoke correct pip binary path
        if [ "$RUNNER_OS" == "Windows" ]; then
          ./venv/Scripts/pip.exe install pyinstaller fastapi pymongo psutil httpx numpy turbovec pydantic sounddevice pytest
        else
          ./venv/bin/pip install pyinstaller fastapi pymongo psutil httpx numpy turbovec pydantic sounddevice pytest
        fi
      shell: bash

    - name: Compile Standalone Backend Sidecar
      run: |
        python build_standalone.py --sidecar-only
      shell: bash

    # --- Linux Specific System Dependencies ---
    - name: Install Linux System Dependencies
      if: matrix.platform == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

    # --- Build Tauri App and Publish to Draft GitHub Release ---
    - name: Build & Publish Tauri Desktop Installer
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tagName: ${{ github.ref_name }}
        tagMessage: "Meridian-X Desktop Release ${{ github.ref_name }}"
        releaseName: "Meridian-X Desktop Release ${{ github.ref_name }}"
        releaseBody: "Automated multi-platform compilation bundle for version ${{ github.ref_name }}. Includes precompiled binaries for Windows (.msi, .exe), macOS (.dmg, .app), and Linux (.deb, AppImage)."
        releaseDraft: true
        prerelease: false
        projectPath: './meridian_frontend'
