name: Compile & Package Multi-Platform Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    # --- Setup Node.js & NPM dependencies ---
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: './meridian_frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: |
        cd meridian_frontend
        npm install --include=optional

    # --- Setup Rust Compiler ---
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    # --- Setup Python Environment & Package Backend ---
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Create Backend Virtualenv & Install Requirements
      run: |
        cd meridian_backend
        python -m venv venv
        ./venv/Scripts/pip.exe install --upgrade pip
        ./venv/Scripts/pip.exe install -r requirements.txt > pip_install.log 2>&1 || { cat pip_install.log; exit 1; }
        ./venv/Scripts/pip.exe install pyinstaller
      shell: bash

    - name: Compile Standalone Backend Sidecar
      run: |
        python build_standalone.py --sidecar-only
      shell: bash

    # --- Install NSIS (required for Tauri nsis bundle target) ---
    - name: Install NSIS
      run: choco install nsis -y
      shell: pwsh

    # --- Build Tauri App ---
    - name: Build Tauri Desktop Installer
      shell: pwsh
      run: |
        Set-Location meridian_frontend
        $output = & npm run tauri build -- --bundles nsis,msi --verbose 2>&1
        $output | Out-File -FilePath tauri_build.log -Encoding utf8
        $output | ForEach-Object { Write-Host $_ }
        if ($LASTEXITCODE -ne 0) {
          Write-Host "`n=== TAURI BUILD FAILED ==="
          Write-Host "Exit code: $LASTEXITCODE"
          exit $LASTEXITCODE
        }

    - name: Upload Build Log on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: tauri-build-log
        path: meridian_frontend/tauri_build.log
        retention-days: 3

    # --- Create GitHub Release and Upload Artifacts ---
    - name: Create Draft Release & Upload Installers
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "${{ github.ref_name }}"
        $repo = "${{ github.repository }}"
        $headers = @{
          Authorization = "Bearer $env:GITHUB_TOKEN"
          "Accept" = "application/vnd.github+json"
          "X-GitHub-Api-Version" = "2022-11-28"
        }

        # Check and delete existing release for tag if present
        try {
          $existing = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/tags/$tag" -Headers $headers -ErrorAction SilentlyContinue
          if ($existing) {
            Write-Host "Deleting existing release for $tag (ID: $($existing.id))..."
            Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/$($existing.id)" -Method DELETE -Headers $headers
          }
        } catch {}

        # Also delete draft releases with matching tag
        try {
          $allReleases = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases" -Headers $headers -ErrorAction SilentlyContinue
          foreach ($r in $allReleases) {
            if ($r.tag_name -eq $tag) {
              Write-Host "Deleting existing draft release ID $($r.id)..."
              Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/$($r.id)" -Method DELETE -Headers $headers
            }
          }
        } catch {}

        $releaseBody = "Automated Windows compilation bundle for version $tag. Includes precompiled binaries for Windows (.msi, .exe)."

        # Create a new draft release via GitHub API
        $releasePayload = @{
          tag_name = $tag
          name = "Meridian-X Windows Release $tag"
          body = $releaseBody
          draft = $true
          prerelease = $false
        } | ConvertTo-Json

        $release = Invoke-RestMethod `
          -Uri "https://api.github.com/repos/$repo/releases" `
          -Method POST `
          -Headers $headers `
          -ContentType "application/json" `
          -Body $releasePayload

        $uploadUrl = $release.upload_url -replace '\{\?name,label\}', ''

        # Find and upload all installer assets
        $bundlePath = "meridian_frontend/src-tauri/target/release/bundle"
        $files = Get-ChildItem -Path $bundlePath -Recurse -Include "*.exe","*.msi" | Where-Object { $_.Name -like "*setup*.exe" -or $_.Name -like "*.msi" }

        foreach ($file in $files) {
          Write-Host "Uploading $($file.Name) ($($file.Length) bytes)..."
          $contentType = if ($file.Extension -eq ".msi") { "application/x-msi" } else { "application/x-msdos-program" }
          Invoke-RestMethod `
            -Uri "${uploadUrl}?name=$($file.Name)" `
            -Method POST `
            -Headers @{ Authorization = "Bearer $env:GITHUB_TOKEN"; "Content-Type" = $contentType } `
            -InFile $file.FullName
        }

        Write-Host "Draft release successfully created: $($release.html_url)"

