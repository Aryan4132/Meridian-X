name: Compile & Package Multi-Platform Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    # --- Setup Node.js & NPM dependencies ---
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: './meridian_frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: |
        cd meridian_frontend
        npm install

    # --- Setup Rust Compiler ---
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    # --- Setup Python Environment & Package Backend ---
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Create Backend Virtualenv & Install Requirements
      run: |
        cd meridian_backend
        python -m venv venv
        ./venv/Scripts/pip.exe install --upgrade pip
        ./venv/Scripts/pip.exe install -r requirements.txt > pip_install.log 2>&1 || { cat pip_install.log; exit 1; }
        ./venv/Scripts/pip.exe install pyinstaller
      shell: bash

    - name: Compile Standalone Backend Sidecar
      run: |
        python build_standalone.py --sidecar-only
      shell: bash

    # --- Build Tauri App ---
    - name: Build Tauri Desktop Installer
      run: |
        cd meridian_frontend
        npm run tauri build
      shell: bash

    # --- Create GitHub Release and Upload Artifacts ---
    - name: Create Draft Release & Upload Installers
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $tag = "${{ github.ref_name }}"
        $releaseBody = "Automated Windows compilation bundle for version $tag. Includes precompiled binaries for Windows (.msi, .exe)."

        # Create a draft release via the GitHub API
        $releasePayload = @{
          tag_name = $tag
          name = "Meridian-X Windows Release $tag"
          body = $releaseBody
          draft = $true
          prerelease = $false
        } | ConvertTo-Json

        $release = Invoke-RestMethod `
          -Uri "https://api.github.com/repos/${{ github.repository }}/releases" `
          -Method POST `
          -Headers @{ Authorization = "Bearer $env:GITHUB_TOKEN"; "Content-Type" = "application/json" } `
          -Body $releasePayload

        $uploadUrl = $release.upload_url -replace '\{\?name,label\}', ''

        # Find and upload all installer assets
        $bundlePath = "meridian_frontend/src-tauri/target/release/bundle"
        $files = Get-ChildItem -Recurse $bundlePath -Include "*.exe","*.msi" | Where-Object { $_.Name -notmatch "\.exe$" -or $_.Name -match "setup" }

        foreach ($file in $files) {
          Write-Host "Uploading $($file.Name)..."
          Invoke-RestMethod `
            -Uri "${uploadUrl}?name=$($file.Name)" `
            -Method POST `
            -Headers @{ Authorization = "Bearer $env:GITHUB_TOKEN"; "Content-Type" = "application/octet-stream" } `
            -InFile $file.FullName
        }

        Write-Host "Draft release created: $($release.html_url)"
