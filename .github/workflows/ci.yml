name: Meridian-X Core Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Python Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install mock requirements and libraries needed to load backend files
        pip install fastapi pymongo psutil httpx numpy turbovec pydantic sounddevice pytest

    - name: Run Tests
      run: |
        python meridian_backend/tests/run_tests.py
